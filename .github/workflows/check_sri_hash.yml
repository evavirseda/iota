name: Check Hash

on:
  schedule:
    - cron: "0 22 * * *" # daily at 10:00 PM (UTC)

jobs:
  check-hash:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Run hash check script
      run: |
        chmod +x .github/scripts/check_sri_hash.sh
        .github/scripts/check_sri_hash.sh
